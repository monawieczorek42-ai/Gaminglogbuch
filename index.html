<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Gamer Logbuch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#2f3136;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:#dcddde}
#app{max-width:480px;margin:0 auto;background:#36393f;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #202225;border-right:1px solid #202225}

/* HEADER */
.hdr{background:#2f3136;padding:10px 14px 0;border-bottom:1px solid #202225;flex-shrink:0}
.logo-container { width: 140px; height: 50px; margin: 0 auto 10px; display: flex; justify-content: space-between; position: relative; }
.logo-half { width: 60px; height: 100%; border: 3px solid; border-radius: 10px 10px 15px 15px; }
.l-half { border-color: #00fbff; box-shadow: 0 0 15px rgba(0, 251, 255, 0.3); }
.r-half { border-color: #b042ff; box-shadow: 0 0 15px rgba(176, 66, 255, 0.3); }
.htitle{text-align:center;font-size:18px;font-weight:800;letter-spacing:4px;color:#fff;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;text-transform:uppercase}
.htitle em{color:#7289da;font-style:normal}

.srow{display:flex;align-items:center;background:#40444b;border-radius:6px;padding:6px 10px;margin-bottom:8px;border:1px solid #202225;gap:7px}
.srow input{background:none;border:none;outline:none;color:#dcddde;font-size:13px;flex:1;font-family:inherit}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cat{background:#40444b;border:1px solid #4f545c;border-radius:20px;padding:3px 12px;font-size:12px;color:#b9bbbe;cursor:pointer;white-space:nowrap;user-select:none;flex-shrink:0}
.cat.on{background:#5865f2;border-color:#5865f2;color:#fff;font-weight:600}

.content{flex:1;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* NAV */
.nav{display:flex;background:#2f3136;border-top:1px solid #202225;flex-shrink:0;height:40px}
.nb{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:#72767d;font-size:11px;font-weight:500;font-family:inherit;border-right:1px solid #202225;padding:0}
.nb.on{color:#7289da;font-weight:700}

/* CARDS */
.card{background:#40444b;border-radius:8px;border:1px solid #202225;margin-bottom:10px;position:relative;overflow:hidden}
.card-row{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ptitle{font-size:17px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.row-hdr{display:flex;align-items:center;margin-bottom:12px}
.av{border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800}

/* FORM & MODAL */
.fi{width:100%;background:#2f3136;border:1px solid #4f545c;border-radius:6px;padding:8px 10px;color:#dcddde;font-size:14px;outline:none}
.fl{font-size:10px;color:#72767d;font-weight:700;text-transform:uppercase;margin-bottom:4px;display:block}
.bp{width:100%;background:#5865f2;border:none;border-radius:8px;padding:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.bs{width:100%;background:#4f545c;border:none;border-radius:8px;padding:11px;color:#b9bbbe;font-size:14px;cursor:pointer;margin-top:6px}
.cls-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.cls-opt{border-radius:6px;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid transparent}
.cls-opt.on{border-color:#fff4;background:#ffffff11}
.fab-wrap{padding:10px 14px 14px;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.fab-btn{width:50px;height:50px;border-radius:50%;background:#5865f2;border:none;cursor:pointer;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center}
.ov{position:fixed;inset:0;background:#000000bb;z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#40444b;border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;border-top:2px solid #5865f255}
.mtitle{font-size:17px;font-weight:800;color:#fff;text-align:center;margin-bottom:16px;text-transform:uppercase}
.delbtn{background:none;border:none;cursor:pointer;color:#72767d;padding:4px 6px;font-size:15px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// DATEN
var WC=[
  {k:"dk",n:"Todesritter",a:"TK",c:"#C41E3A"},{k:"dh",n:"Dämonenjäger",a:"DJ",c:"#A330C9"},
  {k:"druid",n:"Druide",a:"DR",c:"#FF7C0A"},{k:"evoker",n:"Rufer",a:"RU",c:"#33937F"},
  {k:"hunter",n:"Jäger",a:"JÄ",c:"#AAD372"},{k:"mage",n:"Magier",a:"MA",c:"#3FC7EB"},
  {k:"monk",n:"Mönch",a:"MÖ",c:"#00FF98"},{k:"paladin",n:"Paladin",a:"PA",c:"#F48CBA"},
  {k:"priest",n:"Priester",a:"PR",c:"#FFFFFF"},{k:"rogue",n:"Schurke",a:"SC",c:"#FFF468"},
  {k:"shaman",n:"Schamane",a:"SH",c:"#0070DD"},{k:"warlock",n:"Hexenmeister",a:"HX",c:"#8788EE"},
  {k:"warrior",n:"Krieger",a:"KR",c:"#C69B6D"}
];
var GS=[{k:"wow",l:"World of Warcraft",s:"WoW",c:"#ff7d0a",e:"⚔️",w:true},{k:"classic",l:"WoW Classic",s:"Classic",c:"#ffd700",e:"📜",w:true},{k:"hardcore",l:"WoW Hardcore",s:"HC",c:"#ed4245",e:"💀",w:true},{k:"other",l:"Anderes Spiel",s:"?",c:"#72767d",e:"🎮",w:false}];

function isWow(k){return(GS.find(function(g){return g.k===k})||{}).w||false}
function gi(k){return GS.find(function(g){return g.k===k})||GS[GS.length-1]}
function ci(k){return WC.find(function(c){return c.k===k})||WC[0]}

// SPEICHER-LOGIK
var LS_KEY = 'gamer_logbuch_v1';
function save(data){ localStorage.setItem(LS_KEY, JSON.stringify(data)); }
function load(){ var d = localStorage.getItem(LS_KEY); return d ? JSON.parse(d) : null; }

var saved = load() || {};
var S = {
  page: saved.page || 'chars',
  cat: saved.cat || 'Alle',
  chars: saved.chars || [],
  search: '',
  modal: null
};

function setState(patch){
  Object.assign(S, patch);
  save({chars: S.chars, page: S.page, cat: S.cat});
  render();
}

// DEINE MK-FUNKTION
function mk(tag,a,ch){
  var e=document.createElement(tag);
  if(a)Object.keys(a).forEach(function(k){
    if(k==='cls')e.className=a[k];
    else if(k==='style')Object.assign(e.style,a[k]);
    else if(k==='text')e.textContent=a[k];
    else if(k==='html')e.innerHTML=a[k];
    else if(k.startsWith('on'))e.addEventListener(k.substring(2).toLowerCase(),a[k]);
    else e.setAttribute(k,a[k]);
  });
  if(ch)(Array.isArray(ch)?ch:[ch]).forEach(function(c){if(c)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}
function dv(a,ch){return mk('div',a,ch)}

function renderHeader(){
  var hdr=dv({cls:'hdr'});
  var logo=dv({cls:'logo-container'});
  logo.appendChild(dv({cls:'logo-half l-half'}));
  logo.appendChild(dv({cls:'logo-half r-half'}));
  hdr.appendChild(logo);
  hdr.appendChild(dv({cls:'htitle', html:'GAMER <em>LOGBUCH</em>'}));
  var sr=dv({cls:'srow'});
  var si=mk('input',{type:'text',placeholder:'Suchen...',value:S.search});
  si.oninput=function(e){S.search=e.target.value; render()};
  sr.appendChild(si);
  hdr.appendChild(sr);
  var cats=dv({cls:'cats'});
  ['Alle','WoW','Andere'].forEach(function(c){
    var ct=dv({cls:'cat'+(S.cat===c?' on':''), text:c});
    ct.onclick=function(){setState({cat:c})};
    cats.appendChild(ct);
  });
  hdr.appendChild(cats);
  return hdr;
}

function pageChars(){
  var f=S.chars;
  if(S.cat==='WoW') f=f.filter(function(c){return isWow(c.game)});
  if(S.cat==='Andere') f=f.filter(function(c){return !isWow(c.game)});
  if(S.search) f=f.filter(function(c){return c.name.toLowerCase().includes(S.search.toLowerCase())});
  var wrap=dv({});
  wrap.appendChild(dv({cls:'row-hdr'}, [mk('span',{cls:'ptitle',text:'🎮 Helden'})]));
  f.forEach(function(ch, idx){
    var cinfo=ci(ch.cls), ginfo=gi(ch.game);
    var card=dv({cls:'card', style:{borderLeft:'4px solid '+cinfo.c}});
    var row=dv({cls:'card-row'});
    row.appendChild(dv({cls:'av', text:cinfo.a, style:{width:'36px',height:'36px',background:cinfo.c+'22',color:cinfo.c,border:'1px solid '+cinfo.c+'44'}}));
    var inf=dv({style:{flex:1}});
    inf.appendChild(dv({text:ch.name, style:{fontWeight:800, color:'#fff'}}));
    inf.appendChild(dv({text:ginfo.s, style:{fontSize:'11px', color:'#72767d'}}));
    row.appendChild(inf);
    row.appendChild(mk('button',{cls:'delbtn', text:'🗑', onclick:function(){setState({chars: S.chars.filter(function(x){return x.id !== ch.id})})}}));
    card.appendChild(row);
    wrap.appendChild(card);
  });
  return wrap;
}

function modalChar(){
  var t={id:'h'+Date.now(), name:'', game:'wow', cls:'warrior'};
  var m=dv({cls:'modal'});
  m.appendChild(dv({cls:'mtitle', text:'Neuer Held'}));
  var ni=mk('input',{cls:'fi', placeholder:'Name...'});
  ni.oninput=function(e){t.name=e.target.value};
  m.appendChild(ni);
  var grid=dv({cls:'cls-grid'});
  WC.forEach(function(c){
    var o=dv({cls:'cls-opt', text:c.a, style:{color:c.c, background:c.c+'11'}});
    o.onclick=function(){ t.cls=c.k; m.querySelectorAll('.cls-opt').forEach(x=>x.classList.remove('on')); o.classList.add('on'); };
    grid.appendChild(o);
  });
  m.appendChild(grid);
  m.appendChild(mk('button',{cls:'bp', text:'Speichern', onclick:function(){ if(!t.name) return; setState({chars: S.chars.concat([t]), modal:null}); }}));
  m.appendChild(mk('button',{cls:'bs', text:'Abbrechen', onclick:function(){setState({modal:null})}}));
  return m;
}

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(renderHeader());
  var c=dv({cls:'content'});
  if(S.page==='chars') c.appendChild(pageChars());
  app.appendChild(c);
  var fabW=dv({cls:'fab-wrap'});
  fabW.appendChild(mk('button',{cls:'fab-btn', text:'+', onclick:function(){setState({modal:'char'})}}));
  app.appendChild(fabW);
  var nav=dv({cls:'nav'});
  nav.appendChild(dv({cls:'nb' + (S.page==='chars'?' on':''), text:'HELDEN', onclick:function(){setState({page:'chars'})}}));
  nav.appendChild(dv({cls:'nb', text:'WEEKLY'}));
  app.appendChild(nav);
  if(S.modal==='char'){
    var o=dv({cls:'ov'});
    o.appendChild(modalChar());
    app.appendChild(o);
  }
}
render();
</script>
</body>
</html>
