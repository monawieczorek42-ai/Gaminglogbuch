<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Logbuch - Next Gen</title>
    <style>
        :root {
            --bg-dark: #0f1218;
            --card-bg: #1a1f29;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #e0e6ed;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER & LOGO FIX */
        header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #161b25 0%, transparent 100%);
        }

        .logo-container {
            width: 140px; /* Breiter für besseres Verhältnis */
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
        }

        .controller-half {
            width: 60px;
            height: 50px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 15px currentColor;
        }

        .left-half { color: var(--neon-cyan); border: 3px solid var(--neon-cyan); }
        .right-half { color: var(--neon-purple); border: 3px solid var(--neon-purple); }

        /* FORMULAR */
        .hero-form {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: #252d3a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        /* HELDEN LISTE */
        .hero-list {
            width: 90%;
            max-width: 600px;
            display: grid;
            gap: 15px;
        }

        .hero-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .delete-btn {
            width: auto;
            background: #ff4444;
            padding: 5px 10px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="controller-half left-half"></div>
        <div class="controller-half right-half"></div>
    </div>
    <h1>Gamer Logbuch</h1>
</header>

<div class="hero-form">
    <input type="text" id="heroName" placeholder="Name des Helden">
    <select id="heroClass">
        <option value="#C41E3A">Todesritter</option>
        <option value="#A330C9">Dämonenjäger</option>
        <option value="#FF7C0A">Druide</option>
        <option value="#33937F">Rufer</option>
        <option value="#AAD372">Jäger</option>
        <option value="#3FC7EB">Magier</option>
        <option value="#00FF98">Mönch</option>
        <option value="#F48CBA">Paladin</option>
        <option value="#FFFFFF">Priester</option>
        <option value="#FFF468">Schurke</option>
        <option value="#0070DD">Schamane</option>
        <option value="#8788EE">Hexenmeister</option>
        <option value="#C69B6D">Krieger</option>
    </select>
    <input type="text" id="heroGoal" placeholder="Aktuelles Ziel (z.B. Level 60)">
    <button onclick="addHero()">Held hinzufügen</button>
</div>

<div class="hero-list" id="heroList"></div>

<script>
    let heroes = [];

    // 1. LocalStorage Laden
    window.onload = () => {
        const savedData = localStorage.getItem('gamerLogbook_heroes');
        if (savedData) {
            heroes = JSON.parse(savedData);
            renderHeroes();
        }
    };

    function addHero() {
        const name = document.getElementById('heroName').value;
        const color = document.getElementById('heroClass').value;
        const className = document.getElementById('heroClass').options[document.getElementById('heroClass').selectedIndex].text;
        const goal = document.getElementById('heroGoal').value;

        if(!name) return alert("Gib deinem Helden einen Namen!");

        const newHero = { id: Date.now(), name, color, className, goal };
        heroes.push(newHero);
        
        saveAndRender();
        
        // Reset Inputs
        document.getElementById('heroName').value = '';
        document.getElementById('heroGoal').value = '';
    }

    function deleteHero(id) {
        heroes = heroes.filter(h => h.id !== id);
        saveAndRender();
    }

    // 1. LocalStorage Speichern
    function saveAndRender() {
        localStorage.setItem('gamerLogbook_heroes', JSON.stringify(heroes));
        renderHeroes();
    }

    function renderHeroes() {
        const list = document.getElementById('heroList');
        list.innerHTML = '';

        heroes.forEach(hero => {
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.style.borderLeftColor = hero.color;
            card.innerHTML = `
                <div>
                    <strong style="color:${hero.color}">${hero.name}</strong> (${hero.className})<br>
                    <span>Ziel: ${hero.goal || 'Kein Ziel gesetzt'}</span>
                </div>
                <button class="delete-btn" onclick="deleteHero(${hero.id})">X</button>
            `;
            list.appendChild(card);
        });
    }
</script>

</body>
</html>
