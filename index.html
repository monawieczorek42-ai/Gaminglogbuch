<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamer Logbuch</title>
    <style>
        :root {
            --bg-dark: #36393f;
            --bg-sidebar: #2f3136;
            --bg-input: #202225;
            --accent-purple: #7289da;
            --text-main: #dcddde;
            --text-muted: #72767d;
            --cyan: #00fbff;
            --lila: #b042ff;
        }

        body {
            background-color: var(--bg-sidebar);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        /* Dein Original Split-Controller Logo */
        .logo-container {
            width: 120px; /* Jetzt etwas breiter für den Wow-Effekt */
            height: 55px;
            margin: 0 auto 15px;
            display: flex;
            justify-content: space-between;
        }

        .logo-half {
            width: 50px;
            height: 100%;
            border: 3px solid;
            border-radius: 12px 12px 18px 18px;
            transition: filter 0.3s;
        }

        .l-half { border-color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
        .r-half { border-color: var(--lila); filter: drop-shadow(0 0 8px var(--lila)); }

        .content {
            flex-grow: 1;
            padding: 0 20px 100px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }

        .input-box {
            background: var(--bg-input);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            background: #18191c;
            border: 1px solid #000;
            color: white;
            padding: 12px;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 8px;
            font-size: 16px;
        }

        button.add-btn {
            width: 100%;
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .char-card {
            background: #40444b;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            border-left: 5px solid var(--accent-purple);
            animation: fadeIn 0.3s ease;
        }

        .char-info { display: flex; justify-content: space-between; align-items: center; }
        .char-stats { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        .delete-btn { color: #f04747; font-size: 11px; cursor: pointer; text-transform: uppercase; margin-top: 5px; align-self: flex-end;}

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: var(--bg-sidebar);
            display: flex;
            padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.2);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-muted);
            cursor: pointer;
        }

        .nav-item.active { color: white; }
        .nav-item.active::after {
            content: '';
            display: block;
            width: 20px;
            height: 2px;
            background: var(--accent-purple);
            margin: 5px auto 0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-container">
            <div class="logo-half l-half"></div>
            <div class="logo-half r-half"></div>
        </div>
        <h2>LOGBUCH</h2>
    </header>

    <div class="content">
        <div id="chars-section">
            <div class="input-box">
                <input type="text" id="nameInput" placeholder="Name des Helden...">
                <input type="number" id="ilvlInput" placeholder="iLvl">
                <select id="classInput">
                    <option value="#f48cba">Paladin</option>
                    <option value="#c69b6d">Krieger</option>
                    <option value="#ff7c0a">Druide</option>
                    <option value="#3fc7eb">Magier</option>
                    <option value="#c41e3a">Todesritter</option>
                    <option value="#a330c9">Dämonenjäger</option>
                </select>
                <button class="add-btn" onclick="addHero()">Hinzufügen</button>
            </div>
            <div id="heroList"></div>
        </div>

        <div id="goals-section" class="hidden">
            <h3 style="text-align:center">Weekly Goals</h3>
            <div id="todoList"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('chars-section', this)">Helden</div>
        <div class="nav-item" onclick="switchTab('goals-section', this)">Ziele</div>
    </nav>
</div>

<script>
    // Daten laden
    let heroes = JSON.parse(localStorage.getItem('myHeroes')) || [];
    let todos = JSON.parse(localStorage.getItem('myTodos')) || [
        {t: "M+ Key gelaufen", d: false},
        {t: "Raid besucht", d: false},
        {t: "Weltboss", d: false}
    ];

    window.onload = () => { renderHeroes(); renderTodos(); };

    function switchTab(id, el) {
        document.getElementById('chars-section').classList.add('hidden');
        document.getElementById('goals-section').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function addHero() {
        const name = document.getElementById('nameInput').value;
        const ilvl = document.getElementById('ilvlInput').value || '???';
        const color = document.getElementById('classInput').value;
        if(!name) return;

        heroes.push({name, ilvl, color});
        saveAndRender();
        document.getElementById('nameInput').value = '';
        document.getElementById('ilvlInput').value = '';
    }

    function deleteHero(index) {
        heroes.splice(index, 1);
        saveAndRender();
    }

    function toggleTodo(index) {
        todos[index].d = !todos[index].d;
        localStorage.setItem('myTodos', JSON.stringify(todos));
        renderTodos();
    }

    function saveAndRender() {
        localStorage.setItem('myHeroes', JSON.stringify(heroes));
        renderHeroes();
    }

    function renderHeroes() {
        const list = document.getElementById('heroList');
        list.innerHTML = '';
        heroes.forEach((h, i) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.style.borderLeftColor = h.color;
            card.innerHTML = `
                <div class="char-info">
                    <strong>${h.name}</strong>
                    <span style="color: ${h.color}">iLvl ${h.ilvl}</span>
                </div>
                <div class="delete-btn" onclick="deleteHero(${i})">Löschen</div>
            `;
            list.appendChild(card);
        });
    }

    function renderTodos() {
        const list = document.getElementById('todoList');
        list.innerHTML = '';
        todos.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.style.flexDirection = 'row';
            card.style.justifyContent = 'space-between';
            card.innerHTML = `<span>${t.t}</span> <input type="checkbox" ${t.d?'checked':''} onchange="toggleTodo(${i})" style="width: 20px; margin: 0;">`;
            list.appendChild(card);
        });
    }
</script>
</body>
</html>
