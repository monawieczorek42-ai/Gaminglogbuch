<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Gamer Logbuch</title>
<style>
/* DEIN ORIGINALES DESIGN */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#2f3136;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:#dcddde}
#app{max-width:480px;margin:0 auto;background:#36393f;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #202225;border-right:1px solid #202225}

/* HEADER MIT BREITEM LOGO */
.hdr{background:#2f3136;padding:15px 14px 10px;border-bottom:1px solid #202225;flex-shrink:0}
.logo-container { width: 140px; height: 50px; margin: 0 auto 10px; display: flex; justify-content: space-between; position: relative; }
.logo-half { width: 60px; height: 100%; border: 3px solid; border-radius: 10px 10px 15px 15px; }
.l-half { border-color: #00fbff; box-shadow: 0 0 15px rgba(0, 251, 255, 0.3); }
.r-half { border-color: #b042ff; box-shadow: 0 0 15px rgba(176, 66, 255, 0.3); }

.htitle{text-align:center;font-size:18px;font-weight:800;letter-spacing:4px;color:#fff;margin-bottom:8px;text-transform:uppercase}
.htitle em{color:#7289da;font-style:normal}

/* GLASSMORPHISM CARDS */
.card{background:rgba(64, 68, 75, 0.4);backdrop-filter:blur(8px);border-radius:12px;border:1px solid rgba(255,255,255,0.05);margin-bottom:12px;overflow:hidden;transition:0.3s}
.card-row{padding:14px;display:flex;align-items:center;gap:12px}

/* CONTENT & NAV */
.content{flex:1;padding:12px;overflow-y:auto}
.nav{display:flex;background:#2f3136;border-top:1px solid #202225;height:45px}
.nb{flex:1;display:flex;align-items:center;justify-content:center;color:#72767d;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer}
.nb.on{color:#7289da;border-bottom:2px solid #7289da}

/* FORMS */
.fi{width:100%;background:#2f3136;border:1px solid #4f545c;border-radius:6px;padding:8px;color:#fff;margin-bottom:8px;outline:none}
.bp{width:100%;background:#5865f2;border:none;border-radius:8px;padding:12px;color:#fff;font-weight:800;cursor:pointer}
.cls-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.cls-opt{border-radius:6px;padding:6px;cursor:pointer;text-align:center;border:1px solid transparent;font-size:10px;font-weight:800}
.cls-opt.on{border-color:#fff;background:rgba(255,255,255,0.1)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:flex-end}
.modal{background:#2f3136;width:100%;padding:20px;border-radius:20px 20px 0 0;border-top:2px solid #5865f2}
</style>
</head>
<body>
<div id="app"></div>

<script>
// DATEN & FARBEN
var WC=[
    {k:"dk",n:"Todesritter",a:"TK",c:"#C41E3A"},{k:"dh",n:"Dämonenjäger",a:"DJ",c:"#A330C9"},
    {k:"druid",n:"Druide",a:"DR",c:"#FF7C0A"},{k:"evoker",n:"Rufer",a:"RU",c:"#33937F"},
    {k:"hunter",n:"Jäger",a:"JÄ",c:"#AAD372"},{k:"mage",n:"Magier",a:"MA",c:"#3FC7EB"},
    {k:"monk",n:"Mönch",a:"MÖ",c:"#00FF98"},{k:"paladin",n:"Paladin",a:"PA",c:"#F48CBA"},
    {k:"priest",n:"Priester",a:"PR",c:"#FFFFFF"},{k:"rogue",n:"Schurke",a:"SC",c:"#FFF468"},
    {k:"shaman",n:"Schamane",a:"SH",c:"#0070DD"},{k:"warlock",n:"Hexenmeister",a:"HX",c:"#8788EE"},
    {k:"warrior",n:"Krieger",a:"KR",c:"#C69B6D"}
];

// SPEICHER-LOGIK
var LS_KEY='gamer_logbuch_final';
function loadState(){
    var raw=localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
}
function saveState(){
    localStorage.setItem(LS_KEY, JSON.stringify({chars:S.chars, page:S.page}));
}

var saved = loadState() || {};
var S = {
    page: saved.page || 'chars',
    chars: saved.chars || [],
    modal: null
};

// DEINE ORIGINAL MK-FUNKTION
function mk(tag,a,ch){
    var e=document.createElement(tag);
    if(a)Object.keys(a).forEach(function(k){
        if(k==='cls')e.className=a[k];
        else if(k==='style')Object.assign(e.style,a[k]);
        else if(k==='text')e.textContent=a[k];
        else if(k==='html')e.innerHTML=a[k];
        else if(k.startsWith('on'))e.addEventListener(k.substring(2).toLowerCase(),a[k]);
        else e.setAttribute(k,a[k]);
    });
    if(ch)(Array.isArray(ch)?ch:[ch]).forEach(function(c){if(c)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
    return e;
}
function dv(a,ch){return mk('div',a,ch)}

function setState(patch){
    Object.assign(S, patch);
    saveState();
    render();
}

// RENDER HEADER
function renderHeader(){
    var hdr=dv({cls:'hdr'});
    var logo=dv({cls:'logo-container'});
    logo.appendChild(dv({cls:'logo-half l-half'}));
    logo.appendChild(dv({cls:'logo-half r-half'}));
    hdr.appendChild(logo);
    hdr.appendChild(dv({cls:'htitle', html:'GAMER <em>LOGBUCH</em>'}));
    return hdr;
}

// HELDEN SEITE
function pageChars(){
    var wrap=dv({});
    wrap.appendChild(dv({text:'🎮 MEINE HELDEN', style:{fontSize:'11px', fontWeight:800, color:'#72767d', marginBottom:'12px', letterSpacing:'1px'}}));
    
    if(S.chars.length === 0) {
        wrap.appendChild(dv({text:'Keine Helden vorhanden. Tippe auf das +', style:{textAlign:'center', padding:'40px', color:'#4f545c'}}));
    }

    S.chars.forEach(function(ch, idx){
        var cinfo = WC.find(c => c.k === ch.cls) || WC[0];
        var card=dv({cls:'card', style:{borderLeft:'4px solid '+cinfo.c, boxShadow:'0 4px 15px '+cinfo.c+'15'}});
        var row=dv({cls:'card-row'});
        
        row.appendChild(dv({text:cinfo.a, style:{width:'36px',height:'36px',background:cinfo.c+'22', color:cinfo.c, border:'1px solid '+cinfo.c+'44', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:'12px'}}));
        
        var info=dv({style:{flex:1, marginLeft:'10px'}});
        info.appendChild(dv({text:ch.name, style:{fontWeight:800, color:'#fff', fontSize:'15px'}}));
        
        var stats=dv({style:{display:'flex', gap:'6px', marginTop:'4px'}});
        stats.appendChild(dv({text:'iLvl: '+(ch.ilvl || '—'), style:{fontSize:'10px', color:'#b9bbbe', background:'rgba(0,0,0,0.2)', padding:'2px 6px', borderRadius:'4px'}}));
        stats.appendChild(dv({text:'Score: '+(ch.score || '0'), style:{fontSize:'10px', color:'#b9bbbe', background:'rgba(0,0,0,0.2)', padding:'2px 6px', borderRadius:'4px'}}));
        info.appendChild(stats);
        
        row.appendChild(info);
        row.appendChild(mk('button',{text:'🗑', style:{background:'none', border:'none', color:'#4f545c', cursor:'pointer', fontSize:'16px'}, onclick:function(){
            setState({chars: S.chars.filter((_,i) => i!==idx)});
        }}));
        card.appendChild(row);
        wrap.appendChild(card);
    });
    return wrap;
}

// NEUER HELD MODAL
function modalChar(){
    var temp = {name:'', cls:'warrior', ilvl:'', score:''};
    var m = dv({cls:'modal'});
    m.appendChild(dv({text:'NEUER HELD', style:{textAlign:'center', fontWeight:800, color:'#fff', marginBottom:'15px', letterSpacing:'1px'}}));
    
    var ni = mk('input',{cls:'fi', placeholder:'Name des Helden'});
    ni.oninput = e => temp.name = e.target.value;
    m.appendChild(ni);

    var il = mk('input',{cls:'fi', placeholder:'Itemlevel (iLvl)'});
    il.oninput = e => temp.ilvl = e.target.value;
    m.appendChild(il);

    var sc = mk('input',{cls:'fi', placeholder:'M+ Score'});
    sc.oninput = e => temp.score = e.target.value;
    m.appendChild(sc);

    var grid = dv({cls:'cls-grid'});
    WC.forEach(c => {
        var opt = dv({cls:'cls-opt', style:{color:c.c, background:c.c+'11'}, text:c.a});
        opt.onclick = () => {
            document.querySelectorAll('.cls-opt').forEach(el => el.classList.remove('on'));
            opt.classList.add('on');
            temp.cls = c.k;
        };
        grid.appendChild(opt);
    });
    m.appendChild(grid);

    m.appendChild(mk('button',{cls:'bp', text:'SPEICHERN', onclick:function(){
        if(!temp.name) return;
        setState({chars: S.chars.concat([temp]), modal:null});
    }}));
    m.appendChild(mk('button',{text:'ABBRECHEN', style:{width:'100%', background:'none', border:'none', color:'#72767d', marginTop:'10px', cursor:'pointer'}, onclick:()=>setState({modal:null})}));
    return m;
}

// MAIN RENDER
function render(){
    var app=document.getElementById('app');
    app.innerHTML='';
    app.appendChild(renderHeader());

    var cont = dv({cls:'content'});
    if(S.page === 'chars') cont.appendChild(pageChars());
    else cont.appendChild(dv({text:'Hier kommen deine Weekly-Aufgaben...', style:{textAlign:'center', padding:'40px', color:'#4f545c'}}));
    app.appendChild(cont);

    // FAB
    var fab = dv({style:{position:'fixed', bottom:'70px', right:'20px'}});
    fab.appendChild(mk('button',{text:'+', style:{width:'50px', height:'50px', borderRadius:'50%', background:'#5865f2', border:'none', color:'#fff', fontSize:'24px', fontWeight:800, boxShadow:'0 4px 15px rgba(88,101,242,0.4)', cursor:'pointer'}, onclick:()=>setState({modal:'char'})}));
    app.appendChild(fab);

    // NAV
    var nav = dv({cls:'nav'});
    nav.appendChild(mk('button',{cls:'nb' + (S.page==='chars'?' on':''), text:'DASHBOARD', onclick:()=>setState({page:'chars'})}));
    nav.appendChild(mk('button',{cls:'nb' + (S.page==='weekly'?' on':''), text:'WEEKLY', onclick:()=>setState({page:'weekly'})}));
    app.appendChild(nav);

    if(S.modal === 'char'){
        var ov = dv({cls:'ov'});
        ov.appendChild(modalChar());
        app.appendChild(ov);
    }
}

render();
</script>
</body>
</html>
